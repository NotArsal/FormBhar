name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Linter
      run: npm run lint
      
    - name: Run Unit Tests
      run: npm test
      
    - name: Security audit
      run: npm audit --audit-level=high

  backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: formbhar_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'
    - run: npm ci
    - name: Integration tests
      run: npm test
      env:
        DB_USER: test_user
        DB_HOST: localhost
        DB_NAME: formbhar_test
        DB_PASSWORD: test_password
        DB_PORT: 5432
        NODE_ENV: test

  extension-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./extension
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        
    - name: Verify Syntax
      run: |
        find . -name "*.js" -print0 | xargs -0 -I {} node -c {}
