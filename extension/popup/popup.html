<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormBhar - AI Form Filler</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <span class="logo-icon">📝</span>
        <div class="logo-text">
          <h1>FormBhar</h1>
          <span class="tagline">AI Form Filler</span>
        </div>
      </div>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span class="status-text">Ready</span>
      </div>
    </header>

    <!-- Global Stats -->
    <div class="global-stats" style="display: flex; justify-content: space-around; background: #f0f4f8; padding: 8px; border-radius: 8px; margin: 0 16px 16px 16px; font-size: 12px; color: #5f6368;">
      <div>👥 Total Users: <strong id="statTotalUsers">...</strong></div>
      <div>🟢 Live: <strong id="statLiveUsers">...</strong></div>
    </div>

    <!-- Quick Actions -->
    <section class="quick-actions">
      <button id="autoFillBtn" class="action-btn primary">
        <span class="btn-icon">✨</span>
        <span class="btn-text">Auto-Fill with AI</span>
      </button>
      <button id="fillProfileBtn" class="action-btn secondary">
        <span class="btn-icon">👤</span>
        <span class="btn-text">Fill Profile</span>
      </button>
    </section>

    <!-- Save My Info Button -->
    <section class="info-capture">
      <button id="saveMyInfoBtn" class="capture-btn">
        <span class="btn-icon">💾</span>
        <span class="btn-text">Save My Info</span>
        <span class="btn-hint">One-click from current page</span>
      </button>
    </section>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="settings">⚙️ Settings</button>
      <button class="tab" data-tab="history">📋 History</button>
    </div>

    <!-- Settings Panel -->
    <div class="tab-content active" id="settings-panel">
      <!-- API Configuration -->
      <div class="settings-section">
        <h3>AI Provider</h3>
        <div class="form-group">
          <select id="providerSelect" class="form-input">
            <option value="openai">OpenAI (GPT)</option>
            <option value="gemini">Google Gemini</option>
            <option value="claude">Anthropic Claude</option>
          </select>
        </div>
        <div class="form-group">
          <label id="apiKeyLabel">API Key</label>
          <input type="password" id="apiKeyInput" class="form-input" placeholder="Enter API key">
          <input type="hidden" id="geminiApiKey">
          <input type="hidden" id="openaiApiKey">
          <input type="hidden" id="claudeApiKey">
        </div>
      </div>

      <!-- Profile Section -->
      <div class="settings-section">
        <h3>My Profile</h3>
        <div class="profile-grid">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="profileName" class="form-input" placeholder="Your name">
          </div>
          <div class="form-group">
            <label>Roll No / ID</label>
            <input type="text" id="profileRollNo" class="form-input" placeholder="Roll number">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="profileEmail" class="form-input" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="profilePhone" class="form-input" placeholder="Phone number">
          </div>
          <div class="form-group">
            <label>Department</label>
            <input type="text" id="profileDept" class="form-input" placeholder="Your department">
          </div>
          <div class="form-group">
            <label>Class / Year</label>
            <input type="text" id="profileClass" class="form-input" placeholder="Year/Semester">
          </div>
        </div>
      </div>

      <!-- Save Button -->
      <button id="saveBtn" class="save-btn">Save Settings</button>
      <div id="statusMessage" class="status-message"></div>
    </div>

    <!-- History Panel -->
    <div class="tab-content" id="history-panel">
      <div class="history-header">
        <h3>Form History</h3>
        <button id="clearHistoryBtn" class="text-btn">Clear All</button>
      </div>
      <div id="historyList" class="history-list">
        <div class="empty-state">No forms saved yet</div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <span>v2.0.0</span>
      <span>•</span>
      <span>FormBhar</span>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
