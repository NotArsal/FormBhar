<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormBhar - AI Form Filler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <span class="logo-icon">📝</span>
        <div class="logo-text">
          <h1>FormBhar</h1>
          <span class="tagline">AI Form Filler</span>
        </div>
      </div>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span class="status-text">Ready</span>
      </div>
    </header>

    <!-- Global Stats -->
    <div class="global-stats" style="display: flex; justify-content: space-around; background: #f0f4f8; padding: 8px; border-radius: 8px; margin: 0 16px 16px 16px; font-size: 12px; color: #5f6368;">
      <div>👥 Total Users: <strong id="statTotalUsers">...</strong></div>
      <div>🟢 Live: <strong id="statLiveUsers">...</strong></div>
    </div>

    <!-- Update Alert Banner -->
    <div id="updateBanner" class="update-banner" style="display: none;">
      <span class="banner-text">✨ Update Available: <strong id="latestVersion">v2.1.0</strong></span>
      <a href="https://github.com/NotArsal/FormBhar" target="_blank" class="banner-link">Update</a>
    </div>

    <!-- Quick Actions -->
    <section class="quick-actions" style="display: flex; gap: 12px; margin-bottom: 12px;">
      <div class="glass-button-wrap primary" style="flex: 1;">
        <button id="autoFillBtn" class="glass-button">
          <span class="glass-button-text">
            <span>✨</span> Auto-Fill with AI
          </span>
        </button>
        <div class="glass-button-shadow"></div>
      </div>
      <div class="glass-button-wrap secondary" style="flex: 1;">
        <button id="fillProfileBtn" class="glass-button">
          <span class="glass-button-text">
            <span>👤</span> Fill Profile
          </span>
        </button>
        <div class="glass-button-shadow"></div>
      </div>
    </section>

    <!-- Save My Info Button -->
    <section class="info-capture">
      <div class="glass-button-wrap capture-wrap" style="width: 100%;">
        <button id="saveMyInfoBtn" class="glass-button">
          <span class="glass-button-text" style="display: flex; align-items: center; width: 100%;">
            <span>💾</span> <span style="margin-left: 8px;">Save My Info</span>
            <span class="btn-hint" style="margin-left: auto;">One-click from current page</span>
          </span>
        </button>
        <div class="glass-button-shadow"></div>
      </div>
    </section>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="settings">⚙️ Settings</button>
      <button class="tab" data-tab="history">📋 History</button>
    </div>

    <!-- Settings Panel -->
    <div class="tab-content active" id="settings-panel">
      <!-- API Configuration -->
      <div class="settings-section">
        <h3>AI Provider</h3>
        <div class="form-group">
          <select id="providerSelect" class="form-input">
            <option value="openai">OpenAI (GPT)</option>
            <option value="gemini">Google Gemini</option>
            <option value="claude">Anthropic Claude</option>
          </select>
        </div>
        <div class="form-group">
          <label id="apiKeyLabel">API Key</label>
          <input type="password" id="apiKeyInput" class="form-input" placeholder="Enter API key">
          <input type="hidden" id="geminiApiKey">
          <input type="hidden" id="openaiApiKey">
          <input type="hidden" id="claudeApiKey">
        </div>
      </div>

      <!-- Profile Section -->
      <div class="settings-section">
        <h3>My Profile</h3>
        <div class="profile-grid">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="profileName" class="form-input" placeholder="Your name">
          </div>
          <div class="form-group">
            <label>Roll No / ID</label>
            <input type="text" id="profileRollNo" class="form-input" placeholder="Roll number">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="profileEmail" class="form-input" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="profilePhone" class="form-input" placeholder="Phone number">
          </div>
          <div class="form-group">
            <label>Department</label>
            <input type="text" id="profileDept" class="form-input" placeholder="Your department">
          </div>
          <div class="form-group">
            <label>Class / Year</label>
            <input type="text" id="profileClass" class="form-input" placeholder="Year/Semester">
          </div>
        </div>
      </div>

      <!-- Automation Section -->
      <div class="settings-section">
        <h3>Automation</h3>
        <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0;">
          <label style="margin-bottom: 0; font-weight: 600; color: var(--text-secondary);">Autonomous Mode</label>
          <label class="switch">
            <input type="checkbox" id="autonomousToggle">
            <span class="slider round"></span>
          </label>
        </div>
        <div style="font-size: 11px; color: var(--text-muted); margin-top: 6px; font-weight: 500; line-height: 1.4;">
          Automatically fill out forms immediately upon opening. Review and click Submit!
        </div>
      </div>

      <!-- Save Button -->
      <div class="glass-button-wrap save-wrap" style="width: 100%;">
        <button id="saveBtn" class="glass-button">
          <span class="glass-button-text">Save Settings</span>
        </button>
        <div class="glass-button-shadow"></div>
      </div>
      <div id="statusMessage" class="status-message"></div>
    </div>

    <!-- History Panel -->
    <div class="tab-content" id="history-panel">
      <div class="history-header">
        <h3>Form History</h3>
        <button id="clearHistoryBtn" class="text-btn">Clear All</button>
      </div>
      <div id="historyList" class="history-list">
        <div class="empty-state">No forms saved yet</div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <span id="versionText">v2.1.0</span>
      <span>•</span>
      <span>FormBhar</span>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
